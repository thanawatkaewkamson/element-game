<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element Quest 118</title>
  <style>
    :root {
      --bg1: #08143a;
      --bg2: #1733a6;
      --bg3: #00d4ff;
      --card: rgba(255, 255, 255, 0.16);
      --card-solid: #ffffff;
      --text-dark: #163057;
      --text-light: #f8fbff;
      --soft: #dceeff;
      --yellow: #ffd94d;
      --orange: #ff9f43;
      --green: #2ecc71;
      --red: #ff6b6b;
      --purple: #8f7cf7;
      --blue: #4da3ff;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "Trebuchet MS", Tahoma, sans-serif;
      margin: 0;
      min-height: 100vh;
      color: var(--text-light);
      background:
        radial-gradient(circle at 14% 18%, rgba(0, 255, 209, 0.42) 0 4px, transparent 5px),
        radial-gradient(circle at 30% 34%, rgba(255, 255, 255, 0.22) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 22%, rgba(255, 217, 77, 0.45) 0 5px, transparent 6px),
        radial-gradient(circle at 86% 68%, rgba(255, 107, 203, 0.36) 0 5px, transparent 6px),
        radial-gradient(circle at 18% 78%, rgba(77, 163, 255, 0.34) 0 5px, transparent 6px),
        linear-gradient(115deg, transparent 0 47%, rgba(255,255,255,0.12) 47% 48%, transparent 48% 100%),
        linear-gradient(64deg, transparent 0 42%, rgba(0,255,209,0.14) 42% 43%, transparent 43% 100%),
        linear-gradient(rgba(255,255,255,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.055) 1px, transparent 1px),
        radial-gradient(circle at 50% 8%, rgba(0, 212, 255, 0.30), transparent 34%),
        linear-gradient(145deg, #06112f, #102d7d 48%, #008ec9);
      background-size:
        auto,
        auto,
        auto,
        auto,
        auto,
        auto,
        auto,
        42px 42px,
        42px 42px,
        auto,
        auto;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: -1;
      opacity: 0.8;
    }

    body::before {
      width: 360px;
      height: 360px;
      left: max(-130px, -12vw);
      top: max(-90px, -8vw);
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      box-shadow:
        0 0 0 34px rgba(0, 212, 255, 0.05),
        inset 0 0 34px rgba(0, 255, 209, 0.10);
      background:
        radial-gradient(circle, rgba(255, 217, 77, 0.55) 0 7px, transparent 8px),
        linear-gradient(28deg, transparent 48%, rgba(255,255,255,0.16) 49% 51%, transparent 52%),
        linear-gradient(152deg, transparent 48%, rgba(255,255,255,0.16) 49% 51%, transparent 52%);
    }

    body::after {
      width: 460px;
      height: 240px;
      right: max(-170px, -16vw);
      bottom: max(-80px, -8vw);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.14);
      transform: rotate(-18deg);
      box-shadow:
        inset 0 0 0 2px rgba(0, 255, 209, 0.08),
        0 0 34px rgba(0, 212, 255, 0.16);
      background:
        radial-gradient(circle at 23% 50%, rgba(255, 179, 217, 0.78) 0 8px, transparent 9px),
        radial-gradient(circle at 50% 50%, rgba(0, 255, 209, 0.70) 0 7px, transparent 8px),
        radial-gradient(circle at 77% 50%, rgba(255, 217, 77, 0.72) 0 8px, transparent 9px),
        linear-gradient(90deg, transparent 22%, rgba(255,255,255,0.16) 22% 78%, transparent 78%);
    }

    .game-box {
      width: min(100%, 560px);
      border-radius: 28px;
      padding: clamp(16px, 4vw, 28px);
      background:
        radial-gradient(circle at 18% 16%, rgba(0, 255, 209, 0.18) 0 5px, transparent 6px),
        radial-gradient(circle at 82% 20%, rgba(255, 217, 77, 0.20) 0 6px, transparent 7px),
        radial-gradient(circle at 78% 82%, rgba(255, 179, 217, 0.18) 0 5px, transparent 6px),
        linear-gradient(120deg, transparent 0 46%, rgba(255,255,255,0.10) 46% 47%, transparent 47% 100%),
        linear-gradient(64deg, transparent 0 55%, rgba(0,255,209,0.10) 55% 56%, transparent 56% 100%),
        linear-gradient(180deg, rgba(255,255,255,0.20), rgba(8, 20, 58, 0.30)),
        rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.28), 0 0 34px rgba(0, 212, 255, 0.18);
      position: relative;
      overflow: hidden;
    }

    .game-box::before,
    .game-box::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      z-index: 0;
    }

    .game-box::before {
      width: 180px;
      height: 180px;
      top: -60px;
      right: -40px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background:
        radial-gradient(circle, rgba(255, 217, 77, 0.52) 0 7px, transparent 8px),
        linear-gradient(28deg, transparent 48%, rgba(255,255,255,0.20) 49% 51%, transparent 52%),
        rgba(255, 217, 77, 0.08);
      box-shadow: inset 0 0 24px rgba(255, 217, 77, 0.12);
    }

    .game-box::after {
      width: 140px;
      height: 140px;
      bottom: -50px;
      left: -30px;
      border: 2px solid rgba(255, 255, 255, 0.16);
      background:
        radial-gradient(circle at 30% 50%, rgba(255, 179, 217, 0.68) 0 7px, transparent 8px),
        radial-gradient(circle at 70% 50%, rgba(0, 255, 209, 0.62) 0 6px, transparent 7px),
        linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.20) 30% 70%, transparent 70%),
        rgba(255, 64, 129, 0.08);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 18px;
      text-align: center;
    }

    .hero-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-icon {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #fff14d, #ff4fb3);
      box-shadow: 0 10px 24px rgba(255, 79, 179, 0.36), 0 0 18px rgba(255, 241, 77, 0.35);
      font-size: 30px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 6vw, 36px);
      line-height: 1.2;
      text-shadow: 0 2px 10px rgba(0,0,0,0.18);
    }

    .subtitle {
      font-size: clamp(13px, 3.5vw, 15px);
      color: #eaf5ff;
      margin-top: 2px;
    }

    .info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .info div {
      background: rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 10px 8px;
      text-align: center;
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: bold;
    }

    .info span {
      display: block;
      margin-top: 4px;
      font-size: clamp(15px, 4vw, 18px);
      color: #fff8c5;
    }

    .timer-info {
      color: var(--red);
    }

    .timer-info span {
      color: #ffb3d9;
      font-size: clamp(22px, 5.4vw, 28px);
      line-height: 1;
    }

    .symbol-box {
      width: clamp(100px, 28vw, 128px);
      height: clamp(100px, 28vw, 128px);
      margin: 12px auto 18px;
      background: linear-gradient(180deg, #ffffff, #e7fbff);
      color: var(--text-dark);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(42px, 12vw, 58px);
      font-weight: 900;
      box-shadow: 0 12px 26px rgba(22,48,87,0.18);
      border: 4px solid rgba(255,255,255,0.75);
      position: relative;
    }

    .symbol-box::after {
      content: "⚛️";
      position: absolute;
      right: -12px;
      top: -12px;
      font-size: 28px;
      transform: rotate(-12deg);
    }

    .question-wrap {
      background: rgba(255,255,255,0.16);
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .question {
      margin: 0;
      font-size: clamp(18px, 4.9vw, 23px);
      line-height: 1.55;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .choices button {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: clamp(16px, 4.5vw, 19px);
      font-weight: bold;
      cursor: pointer;
      color: var(--text-dark);
      background: linear-gradient(180deg, #ffffff, #c9f4ff);
      box-shadow: 0 6px 14px rgba(14, 60, 120, 0.12);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      touch-action: manipulation;
      overflow-wrap: anywhere;
    }

    .choices button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 16px rgba(14, 60, 120, 0.16);
      background: linear-gradient(180deg, #ffffff, #aeeeff);
    }

    .choices button:disabled {
      cursor: default;
      transform: none;
    }

    .correct {
      background: linear-gradient(180deg, #34e27a, #22b75b) !important;
      color: #ffffff !important;
    }

    .wrong {
      background: linear-gradient(180deg, #ff8b8b, #ff6666) !important;
      color: #ffffff !important;
    }

    .result {
      min-height: 60px;
      margin-top: 14px;
      font-size: clamp(16px, 4.2vw, 18px);
      line-height: 1.55;
      text-align: center;
      font-weight: bold;
    }

    .result small {
      display: block;
      margin-top: 6px;
      font-weight: normal;
      color: #eaf5ff;
    }

    .feedback-panel .result {
      min-height: 0;
      margin-bottom: 2px;
    }

    .controls {
      text-align: center;
    }

    .start-panel {
      display: grid;
      place-items: center;
      min-height: 250px;
      text-align: center;
    }

    .next-btn, .restart-btn {
      margin-top: 10px;
      padding: 13px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #fff14d, #ffb000);
      color: var(--text-dark);
      font-size: clamp(16px, 4.4vw, 18px);
      font-weight: 900;
      cursor: pointer;
      min-width: 150px;
      min-height: 50px;
      box-shadow: 0 12px 20px rgba(255, 176, 0, 0.35), 0 0 18px rgba(255, 241, 77, 0.30);
    }

    .play-btn {
      min-width: 190px;
      min-height: 60px;
      border: none;
      border-radius: 999px;
      padding: 14px 30px;
      background: linear-gradient(180deg, #ffb3d9, #ff4fb3);
      color: #ffffff;
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(255, 79, 179, 0.36), 0 0 22px rgba(255, 179, 217, 0.34);
    }

    .next-btn {
      margin-top: 2px;
    }

    .next-btn:hover, .restart-btn:hover, .play-btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .small-note {
      margin-top: 16px;
      text-align: center;
      font-size: clamp(12px, 3.4vw, 14px);
      color: #eaf5ff;
      line-height: 1.55;
    }

    .footer-badges {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      color: #ffffff;
    }


    .orbit {
      position: absolute;
      border: 2px solid rgba(255,255,255,0.20);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: spin 12s linear infinite;
    }

    .orbit.one {
      width: 220px;
      height: 70px;
      top: 68px;
      left: -70px;
      transform: rotate(-18deg);
    }

    .orbit.two {
      width: 250px;
      height: 82px;
      right: -88px;
      bottom: 115px;
      transform: rotate(22deg);
      animation-duration: 16s;
    }

    @keyframes spin {
      from { filter: hue-rotate(0deg); }
      to { filter: hue-rotate(360deg); }
    }


    @media (max-width: 600px) {
      body {
        padding: 0;
        align-items: flex-start;
      }

      .game-box {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        padding: 14px 14px 112px;
      }

      .hero {
        margin-bottom: 10px;
        gap: 10px;
      }

      .hero-top {
        gap: 10px;
      }

      .hero-icon {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        font-size: 26px;
      }

      .info {
        gap: 8px;
        margin-bottom: 10px;
      }

      .info div {
        padding: 8px 5px;
        border-radius: 15px;
      }

      .symbol-box {
        width: 92px;
        height: 92px;
        margin: 10px auto 12px;
        border-radius: 20px;
        font-size: 42px;
      }

      .symbol-box::after {
        font-size: 24px;
        right: -10px;
        top: -10px;
      }

      .question-wrap {
        padding: 11px 12px;
        margin-bottom: 10px;
        border-radius: 18px;
      }

      .choices {
        gap: 9px;
      }

      .choices button {
        min-height: 48px;
        padding: 10px 12px;
        border-radius: 16px;
      }

      .result {
        min-height: 0;
        margin: 0;
      }

      .feedback-panel {
        display: none;
      }

      .feedback-panel.show {
        display: block;
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;
        z-index: 99;
        padding: 10px 12px 12px;
        border-radius: 22px;
        background: rgba(8, 20, 58, 0.92);
        border: 1px solid rgba(255,255,255,0.25);
        box-shadow: 0 12px 28px rgba(0,0,0,0.35), 0 0 20px rgba(0, 212, 255, 0.25);
        backdrop-filter: blur(10px);
      }

      .feedback-panel .result {
        font-size: 15px;
        line-height: 1.4;
      }

      .feedback-panel .next-btn,
      .feedback-panel .restart-btn {
        margin-top: 8px;
        min-height: 44px;
        padding: 10px 22px;
      }

      .feedback-panel .next-btn {
        margin-top: 2px;
      }

      .small-note,
      .footer-badges {
        display: none;
      }
    }

    @media (min-width: 720px) {
      .hero {
        gap: 16px;
      }

      .choices {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
        align-items: flex-start;
      }

      .game-box {
        border-radius: 22px;
        padding: 14px;
      }

      .info {
        gap: 8px;
      }

      .question-wrap {
        padding: 12px 12px;
      }
    }

    @media (max-height: 720px) and (orientation: landscape) {
      body {
        align-items: flex-start;
      }

      .symbol-box {
        width: 90px;
        height: 90px;
        font-size: 40px;
      }
    }
  
    /* Compact mobile layout: reduce vertical gaps so feedback is visible more easily */
    @media (max-width: 600px) {
      .game-box {
        padding: 10px 10px 92px !important;
      }

      .hero {
        margin-bottom: 6px !important;
        gap: 6px !important;
      }

      .hero-top {
        gap: 8px !important;
      }

      .hero-icon {
        width: 42px !important;
        height: 42px !important;
        border-radius: 14px !important;
        font-size: 22px !important;
      }

      h1 {
        font-size: clamp(21px, 5.2vw, 28px) !important;
        line-height: 1.1 !important;
      }

      .subtitle {
        font-size: 13px !important;
        margin-top: 0 !important;
      }

      .info {
        gap: 6px !important;
        margin-bottom: 6px !important;
      }

      .info div {
        padding: 6px 4px !important;
        border-radius: 13px !important;
        font-size: 12px !important;
        line-height: 1.15 !important;
      }

      .info span {
        margin-top: 2px !important;
        font-size: 15px !important;
      }

      .symbol-box {
        width: 76px !important;
        height: 76px !important;
        margin: 6px auto 8px !important;
        border-radius: 17px !important;
        font-size: 34px !important;
        border-width: 3px !important;
      }

      .symbol-box::after {
        font-size: 20px !important;
        right: -8px !important;
        top: -8px !important;
      }

      .question-wrap {
        padding: 9px 10px !important;
        margin-bottom: 7px !important;
        border-radius: 16px !important;
      }

      .question {
        font-size: clamp(16px, 4.3vw, 19px) !important;
        line-height: 1.35 !important;
      }

      .choices {
        gap: 7px !important;
      }

      .choices button {
        min-height: 42px !important;
        padding: 8px 10px !important;
        border-radius: 14px !important;
        font-size: clamp(15px, 4vw, 17px) !important;
      }

      .feedback-panel.show {
        left: 8px !important;
        right: 8px !important;
        bottom: 8px !important;
        padding: 8px 10px 10px !important;
        border-radius: 18px !important;
      }

      .feedback-panel .result {
        font-size: 14px !important;
        line-height: 1.3 !important;
      }

      .feedback-panel .next-btn,
      .feedback-panel .restart-btn {
        margin-top: 6px !important;
        min-height: 40px !important;
        padding: 8px 18px !important;
        font-size: 15px !important;
      }

      .feedback-panel .next-btn {
        margin-top: 2px !important;
      }

      .orbit.one,
      .orbit.two {
        opacity: 0.45;
      }
    }

    @media (max-height: 720px) and (max-width: 600px) {
      .game-box {
        padding-bottom: 86px !important;
      }

      .symbol-box {
        width: 70px !important;
        height: 70px !important;
        font-size: 32px !important;
      }

      .choices button {
        min-height: 40px !important;
      }
    }

  
    /* Put answer feedback and next button directly under choices */
    @media (max-width: 600px) {
      .game-box {
        padding-bottom: 12px !important;
      }

      .feedback-panel {
        display: none;
        margin-top: 8px;
      }

      .feedback-panel.show {
        display: block !important;
        position: static !important;
        left: auto !important;
        right: auto !important;
        bottom: auto !important;
        z-index: auto !important;
        padding: 9px 10px 10px !important;
        border-radius: 18px !important;
        background: rgba(255, 255, 255, 0.16) !important;
        border: 1px solid rgba(255,255,255,0.25) !important;
        box-shadow: 0 8px 18px rgba(0,0,0,0.18) !important;
        backdrop-filter: blur(8px);
      }

      .feedback-panel .result {
        font-size: 14px !important;
        line-height: 1.35 !important;
        min-height: 0 !important;
        margin: 0 !important;
      }

      .feedback-panel .next-btn,
      .feedback-panel .restart-btn {
        margin-top: 7px !important;
        min-height: 40px !important;
        padding: 8px 18px !important;
        font-size: 15px !important;
      }

      .feedback-panel .next-btn {
        margin-top: 2px !important;
      }
    }


    .fact-box {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #f8fbff;
      font-size: clamp(16px, 4.4vw, 18px);
      line-height: 1.45;
      text-align: left;
    }

    .fact-box.show {
      display: block;
    }

    .fact-box strong {
      color: #fff14d;
    }

    .fact-box a {
      color: #fff14d;
      font-weight: 900;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .more-label {
      font-size: 0.82em;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .fact-box {
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 14px;
        font-size: 15px;
        line-height: 1.35;
      }
    }

  </style>
</head>
<body>
  <div class="game-box">
    <div class="orbit one"></div>
    <div class="orbit two"></div>
    <div class="content">
      <div class="hero">
        <div class="hero-top">
          <div class="hero-icon">⚗️</div>
          <div>
            <h1>Element Quest 118</h1>
          </div>
        </div>

      </div>

      <div class="start-panel" id="startPanel">
        <button class="play-btn" onclick="startGame()">Play</button>
      </div>

      <div id="gameArea" style="display:none;">
        <div class="info">
          <div>ข้อ<span id="round">1/10</span></div>
          <div>คะแนน<span id="score">0</span></div>
          <div class="timer-info">⏰<span id="timer">10</span></div>
        </div>

        <div class="symbol-box" id="symbolBox">?</div>

        <div class="question-wrap">
          <p class="question" id="questionText"></p>
        </div>

        <div class="choices" id="choicesBox"></div>

        <div class="feedback-panel" id="feedbackPanel">
          <div class="result" id="resultText"></div>

          <div class="controls">
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">

    let score = 0;
    let round = 1;
    const totalQuestions = 10;
    const secondsPerQuestion = 10;
    let currentQuestion = null;
    let answered = false;
    let timeLeft = secondsPerQuestion;
    let timerId = null;
    let audioContext = null;

    const praiseSentences = [
      "ยอดเยี่ยมมาก! ตอบได้แม่นมาก",
      "เก่งมาก! คำตอบนี้ถูกต้องเป๊ะ",
      "สุดยอด! จำตารางธาตุได้ดีมาก",
      "เยี่ยมเลย! ตอบได้อย่างมั่นใจ",
      "ตอบถูกแล้ว! ไปต่อได้เลย",
      "ดีมาก! ความรู้เรื่องธาตุแน่นขึ้นอีกแล้ว",
      "ว้าว! คำตอบนี้แม่นจริง ๆ",
      "ยอดเลย! จังหวะตอบดีมาก",
      "เก่งสุด ๆ! คะแนนกำลังมาแล้ว",
      "ถูกต้อง! ทำได้ดีมาก"
    ];

    let unusedPraises = shuffle(praiseSentences);

    function getRandomPraise() {
      if (unusedPraises.length === 0) {
        unusedPraises = shuffle(praiseSentences);
      }

      return unusedPraises.pop();
    }

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function randomElement() {
      return elements[Math.floor(Math.random() * elements.length)];
    }

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function playTick() {
      initAudio();
      if (!audioContext || audioContext.state !== "running") return;

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(900, audioContext.currentTime);
      gain.gain.setValueAtTime(0.08, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.06);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.06);
    }

    function createQuestion() {
      const element = randomElement();
      const questionTypes = ["symbolToName", "nameToSymbol", "atomicNumber"];
      const type = questionTypes[Math.floor(Math.random() * questionTypes.length)];

      let questionText = "";
      let correctAnswer = "";
      let displaySymbol = "?";
      let choices = [];

      if (type === "symbolToName") {
        questionText = `สัญลักษณ์ "${element.symbol}" คือธาตุอะไร?`;
        correctAnswer = element.th;
        displaySymbol = element.symbol;
        choices = elements.filter(e => e.th !== correctAnswer).map(e => e.th);
      } else if (type === "nameToSymbol") {
        questionText = `ธาตุ "${element.th}" ใช้สัญลักษณ์ใด?`;
        correctAnswer = element.symbol;
        displaySymbol = "?";
        choices = elements.filter(e => e.symbol !== correctAnswer).map(e => e.symbol);
      } else if (type === "atomicNumber") {
        questionText = `เลขอะตอมของ "${element.th}" คือข้อใด?`;
        correctAnswer = String(element.no);
        displaySymbol = "?";
        choices = elements.filter(e => e.no !== element.no).map(e => String(e.no));
      }

      choices = shuffle(choices).slice(0, 3);
      choices.push(correctAnswer);
      choices = shuffle(choices);

      return { element, type, questionText, correctAnswer, displaySymbol, choices };
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function startTimer() {
      stopTimer();
      timeLeft = secondsPerQuestion;
      document.getElementById("timer").textContent = timeLeft;

      timerId = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").textContent = timeLeft;

        if (timeLeft <= 0) {
          stopTimer();
          handleTimeUp();
        } else {
          playTick();
        }
      }, 1000);
    }

    function showFact() {
      const wikiUrl = `https://th.wikipedia.org/wiki/${encodeURIComponent(currentQuestion.element.th)}`;
      document.getElementById("factText").innerHTML =
        `<strong>เกร็ดความรู้:</strong> <b>${currentQuestion.element.en} (${currentQuestion.element.symbol}, ${currentQuestion.element.no})</b>: ${currentQuestion.element.fact} <span class="more-label">ดูเพิ่มเติม:</span> <a href="${wikiUrl}" target="_blank" rel="noopener noreferrer">Wikipedia</a>`;
      document.getElementById("factText").classList.add("show");
    }

    function handleTimeUp() {
      if (answered) return;
      answered = true;

      const allButtons = document.querySelectorAll(".choices button");
      allButtons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === currentQuestion.correctAnswer) {
          btn.classList.add("correct");
        }
      });

      document.getElementById("resultText").innerHTML =
        `⏰ หมดเวลาจ้า<small>เฉลยคือ ${currentQuestion.correctAnswer}</small>`;
      document.getElementById("feedbackPanel").classList.add("show");
      document.getElementById("nextBtn").style.display = "inline-block";
      showFact();
    }

    function showQuestion() {
      stopTimer();
      answered = false;
      currentQuestion = createQuestion();

      document.getElementById("round").textContent = `${round}/${totalQuestions}`;
      document.getElementById("score").textContent = score;
      document.getElementById("symbolBox").textContent = currentQuestion.displaySymbol;
      document.getElementById("questionText").textContent = currentQuestion.questionText;
      document.getElementById("resultText").innerHTML = "";
      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("feedbackPanel").classList.remove("show");
      document.getElementById("factText").classList.remove("show");
      document.getElementById("factText").innerHTML = "";

      const choicesBox = document.getElementById("choicesBox");
      choicesBox.innerHTML = "";

      currentQuestion.choices.forEach(choice => {
        const button = document.createElement("button");
        button.textContent = choice;
        button.onclick = function() {
          initAudio();
          checkAnswer(button, choice);
        };
        choicesBox.appendChild(button);
      });

      startTimer();
    }

    function startGame() {
      initAudio();
      score = 0;
      round = 1;
      unusedPraises = shuffle(praiseSentences);
      document.getElementById("startPanel").style.display = "none";
      document.getElementById("gameArea").style.display = "block";
      document.getElementById("restartBtn").style.display = "none";
      showQuestion();
    }

    function checkAnswer(button, selectedAnswer) {
      if (answered) return;
      answered = true;
      stopTimer();

      const allButtons = document.querySelectorAll(".choices button");
      allButtons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === currentQuestion.correctAnswer) {
          btn.classList.add("correct");
        }
      });

      if (selectedAnswer === currentQuestion.correctAnswer) {
        score++;
        button.classList.add("correct");
        document.getElementById("resultText").innerHTML = "✅ " + getRandomPraise();
      } else {
        button.classList.add("wrong");
        document.getElementById("resultText").innerHTML =
          `❌ ยังไม่ถูกนะ ลองใหม่ได้เสมอ<small>เฉลยคือ ${currentQuestion.correctAnswer}</small>`;
      }

      document.getElementById("score").textContent = score;
      document.getElementById("feedbackPanel").classList.add("show");
      document.getElementById("nextBtn").style.display = "inline-block";
      showFact();
    }

    function nextQuestion() {
      round++;
      if (round > totalQuestions) {
        endGame();
      } else {
        showQuestion();
      }
    }

    function endGame() {
      stopTimer();
      document.getElementById("timer").textContent = "0";
      document.getElementById("symbolBox").textContent = "🏆";
      document.getElementById("questionText").textContent = "จบเกมแล้ว!";
      document.getElementById("choicesBox").innerHTML = "";
      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("feedbackPanel").classList.add("show");
      document.getElementById("restartBtn").style.display = "inline-block";
      document.getElementById("factText").classList.remove("show");
      document.getElementById("factText").innerHTML = "";

      let level = "";
      if (score >= 9) {
        level = "สุดยอด! ความรู้เรื่องธาตุยอดเยี่ยมมาก";
      } else if (score >= 7) {
        level = "เก่งมาก! เข้าใจเรื่องธาตุได้ดีเลย";
      } else if (score >= 5) {
        level = "ทำได้ดีมาก ฝึกต่ออีกนิดจะยิ่งคล่อง";
      } else {
        level = "เริ่มต้นได้ดี ลองเล่นอีกครั้งเพื่อทำคะแนนเพิ่มนะ";
      }

      document.getElementById("resultText").innerHTML =
        `คุณได้ ${score}/${totalQuestions} คะแนน<small>${level}</small>`;
    }

    function restartGame() {
      initAudio();
      score = 0;
      round = 1;
      unusedPraises = shuffle(praiseSentences);
      document.getElementById("restartBtn").style.display = "none";
      document.getElementById("feedbackPanel").classList.remove("show");
      document.getElementById("factText").classList.remove("show");
      document.getElementById("factText").innerHTML = "";
      showQuestion();
    }

    document.addEventListener("pointerdown", initAudio, { once: true });
  </script>
</body>
</html>
